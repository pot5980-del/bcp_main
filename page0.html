<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 포털 메인</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        /* 스크롤바 숨김 처리 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen w-full bg-[#f4f6fa] p-4 lg:p-6 text-slate-800 flex justify-center overflow-hidden">
    <div class="w-full max-w-[1600px] h-full flex flex-col">
        
        <!-- Header Section -->
        <header class="shrink-0 flex justify-between items-end mb-6 gap-4 border-b border-slate-200/60 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">안녕하세요, 홍혜림 님 👋</h1>
                <p class="text-[14px] text-slate-500 mt-1.5 font-medium">컨설팅사업부 / SWAT팀 · 2026년 4월 20일 (월)</p>
            </div>
        </header>

        <!-- Main Layout Grid (Left 3 : Center 5 : Right 4) -->
        <div class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-12 gap-5 lg:gap-6">
            
            <!-- Left Column (Span 3) - 개인화 영역 -->
            <div class="lg:col-span-3 flex flex-col gap-5 lg:gap-6 h-full min-h-0">
                
                <!-- 상단: 일일업무 -->
                <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex-1 min-h-0 flex flex-col">
                    <div class="shrink-0 flex justify-between items-center mb-5">
                        <h2 class="text-[16px] font-bold flex items-center gap-2">
                            <i data-lucide="clipboard-list" class="text-red-400 w-5 h-5"></i> 
                            오늘의 일일업무
                        </h2>
                        <button class="text-[12px] text-slate-500 hover:text-slate-800 flex items-center gap-1 font-medium transition-colors">
                            등록하기 <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </button>
                    </div>

                    <div class="flex-1 min-h-0 overflow-y-auto space-y-5 pr-2 scrollbar-hide">
                        <div>
                            <h3 class="text-[13px] font-bold text-slate-700 flex items-center gap-1.5 mb-2.5">
                                <span class="w-2 h-2 rounded-full bg-blue-500"></span> 오전
                            </h3>
                            <div class="bg-[#f8f9fc] rounded-xl p-3.5 text-[13px] text-slate-700 space-y-2.5 border border-slate-50">
                                <p class="font-medium">1. 주간 회의</p>
                                <div>
                                    <p class="font-medium">2. Demo</p>
                                    <p class="text-slate-500 mt-1 pl-3.5 relative before:content-['-'] before:absolute before:left-0 text-[12px]">
                                        신규 디자인 메인 워딩 검토 및 수정
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-[13px] font-bold text-slate-700 flex items-center gap-1.5 mb-2.5">
                                <span class="w-2 h-2 rounded-full bg-orange-400"></span> 오후
                            </h3>
                            <div class="bg-[#f8f9fc] rounded-xl p-3.5 text-[13px] text-slate-700 space-y-2.5 border border-slate-50">
                                <div>
                                    <p class="font-medium">3. Demo</p>
                                    <p class="text-slate-500 mt-1 pl-3.5 relative before:content-['-'] before:absolute before:left-0 text-[12px]">
                                        신규 디자인 메인 워딩 검토 및 수정
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 하단: 오늘의 날씨 -->
                <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 shrink-0 flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-[16px] font-bold flex items-center gap-2">
                            <i data-lucide="cloud-sun" class="text-sky-500 w-5 h-5"></i> 오늘의 날씨
                        </h2>
                        <span class="text-[12px] text-slate-500 font-medium">서울, 대한민국</span>
                    </div>
                    
                    <div class="flex justify-between items-center px-1 py-1">
                        <div class="flex items-center gap-4">
                            <i data-lucide="sun" class="w-12 h-12 text-orange-400"></i>
                            <div>
                                <p class="text-[32px] leading-none font-bold text-slate-800">22°</p>
                                <p class="text-[13px] text-slate-500 mt-2 font-medium">대체로 맑음</p>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5 text-right">
                            <p class="text-[12px] text-slate-500"><span class="text-red-400 font-bold mr-1.5">최고</span>25°</p>
                            <p class="text-[12px] text-slate-500"><span class="text-blue-400 font-bold mr-1.5">최저</span>14°</p>
                            <p class="text-[12px] text-slate-500"><span class="text-slate-400 font-bold mr-1.5">미세</span>보통</p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Center Column (Span 5) - 핵심 인프라 영역 -->
            <div class="lg:col-span-5 flex flex-col h-full min-h-0">
                
                <!-- 회의실 예약 현황 (전체 꽉 채움) -->
                <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 h-full flex flex-col">
                    <div class="shrink-0 flex justify-between items-center mb-4">
                        <h2 class="text-[16px] font-bold flex items-center gap-2">
                            <i data-lucide="building-2" class="text-blue-400 w-5 h-5"></i> 회의실 예약 현황
                        </h2>
                        <button class="text-[12px] text-slate-500 hover:text-slate-800 flex items-center gap-1 font-medium transition-colors">
                            예약하기 <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </button>
                    </div>
                    
                    <div class="shrink-0 flex items-center gap-4 mb-3 text-[12px] text-slate-400 font-medium border-b border-slate-50 pb-3">
                        <span>2026.04.20 기준 · 주요 시간대</span>
                        <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 border border-red-200 bg-red-50 rounded-sm"></span> 예약됨</span>
                        <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 border border-green-200 bg-green-50 rounded-sm"></span> 예약가능</span>
                    </div>
                    
                    <div class="flex-1 min-h-0 overflow-y-auto pr-1 scrollbar-hide">
                        <table class="w-full text-[13px] text-center border-collapse whitespace-nowrap">
                            <thead class="sticky top-0 bg-white shadow-sm z-10">
                                <tr class="text-slate-500 font-semibold border-b border-slate-100">
                                    <th class="py-3 text-left w-1/4">회의실</th>
                                    <th class="py-3">09~11시</th>
                                    <th class="py-3">11~13시</th>
                                    <th class="py-3">14~16시</th>
                                    <th class="py-3">16~18시</th>
                                </tr>
                            </thead>
                            <tbody id="meeting-room-list" class="divide-y divide-slate-50">
                                <!-- JS로 렌더링됨 -->
                            </tbody>
                        </table>
                    </div>
                </section>

            </div>

            <!-- Right Column (Span 4) - 도구/소통 영역 (퀵메뉴 + 게시판) -->
            <div class="lg:col-span-4 flex flex-col gap-5 lg:gap-6 h-full min-h-0">
                
                <!-- 상단: 퀵 메뉴 -->
                <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 shrink-0 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[16px] font-bold flex items-center gap-2">
                            <i data-lucide="link-2" class="text-indigo-500 w-5 h-5"></i> 퀵 메뉴
                        </h2>
                        <button class="text-[12px] text-slate-500 hover:text-slate-800 flex items-center gap-1 font-medium">
                            전체보기 <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-2.5">
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-orange-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="file-signature" class="w-5 h-5 text-orange-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">전자결재</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-emerald-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="users" class="w-5 h-5 text-emerald-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">CRM</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-purple-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="bot" class="w-5 h-5 text-purple-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">B-GPT</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-sky-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="mail" class="w-5 h-5 text-sky-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">메일</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-teal-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="beaker" class="w-5 h-5 text-teal-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">RND</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-indigo-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="download" class="w-5 h-5 text-indigo-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">제품 다운로드</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-blue-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="database" class="w-5 h-5 text-blue-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">ERP</span>
                        </button>
                        <button class="flex flex-col items-center justify-center py-2.5 rounded-xl border border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all group bg-white">
                            <div class="p-2 rounded-full bg-pink-50 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="cloud" class="w-5 h-5 text-pink-500"></i></div>
                            <span class="text-[11px] font-bold text-slate-700 truncate w-full px-1 text-center">웹하드</span>
                        </button>
                    </div>
                </section>

                <!-- 하단: 게시판 -->
                <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex-1 min-h-0 flex flex-col">
                    <div class="shrink-0 flex justify-between items-center mb-4">
                        <h2 class="text-[16px] font-bold flex items-center gap-2">
                            <i data-lucide="message-square" class="text-pink-500 w-5 h-5"></i> 게시판
                        </h2>
                        <button class="text-[12px] text-slate-500 hover:text-slate-800 flex items-center gap-1 font-medium transition-colors">
                            전체보기 <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </button>
                    </div>

                    <!-- Tabs -->
                    <div id="board-tabs" class="shrink-0 flex bg-[#f8f9fc] rounded-xl p-1 mb-3.5">
                        <button onclick="changeTab('공지사항')" data-tab="공지사항" class="board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all bg-white shadow-sm text-slate-800 border border-slate-100">공지사항</button>
                        <button onclick="changeTab('BI 뉴스')" data-tab="BI 뉴스" class="board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all text-slate-400 hover:text-slate-600">BI 뉴스</button>
                        <button onclick="changeTab('FAQ')" data-tab="FAQ" class="board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all text-slate-400 hover:text-slate-600">FAQ</button>
                        <button onclick="changeTab('QnA')" data-tab="QnA" class="board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all text-slate-400 hover:text-slate-600">QnA</button>
                    </div>

                    <!-- Board List -->
                    <div class="flex-1 min-h-0 overflow-y-auto pr-1 scrollbar-hide">
                        <ul id="board-list" class="space-y-1">
                            <!-- JS로 렌더링됨 -->
                        </ul>
                    </div>
                </section>

            </div>

        </div>
    </div>

    <!-- Javascript Logic -->
    <script>
        // Lucide Icon 초기화
        lucide.createIcons();

        // Data Models
        const boardData = {
            '공지사항': [
                { id: 1, type: '공지', title: '[공고] 인사 명령(신규입사)', date: '04.14' },
                { id: 2, type: '공지', title: '2025년 인사고과 실시의 건', date: '03.03' },
                { id: 3, type: '공지', title: '[공고] 인사 명령(부서변경)', date: '02.24' },
                { id: 4, type: '공지', title: '[공지] 설날 선물 주소록 정비 공지', date: '02.05' },
                { id: 5, type: '공지', title: '[공고] 인사 명령(신규입사)', date: '02.02' },
                { id: 6, type: '안내', title: '개인정보 보호 교육 이수 안내', date: '01.30' },
                { id: 7, type: '안내', title: '사내 카페테리아 신규 메뉴 안내', date: '01.25' },
                { id: 8, type: '공지', title: '연말정산 서류 제출 안내', date: '01.15' },
            ],
            'BI 뉴스': [
                { id: 1, type: '뉴스', title: "기업용 AI 보안 '트리니티' 표준 제시", date: '04.16' },
                { id: 2, type: '뉴스', title: '2026년 3월 사내소식지', date: '03.17' },
                { id: 3, type: '뉴스', title: "PwC컨설팅과 전략적 파트너십 체결", date: '01.08' },
            ],
            'FAQ': [
                { id: 1, type: 'FAQ', title: '비밀번호 초기화는 어떻게 하나요?', date: '01.10' },
                { id: 2, type: 'FAQ', title: '사내 VPN 접속 가이드', date: '01.05' },
            ],
            'QnA': [
                { id: 1, type: 'QnA', title: '법인카드 한도 증액 문의드립니다.', date: '04.18' },
            ]
        };

        const meetingRooms = [
            { name: '본사 10층', type: '대회의실', status: ['예약됨', '가능', '예약됨', '가능'] },
            { name: '본사 11층', type: '대회의실', status: ['예약됨', '예약됨', '가능', '가능'] },
            { name: '본사 12층', type: '3회의실', status: ['가능', '가능', '예약됨', '가능'] },
            { name: '본사 17층', type: '소회의실', status: ['예약됨', '예약됨', '가능', '가능'] },
            { name: '교육센터', type: '1회의실', status: ['예약됨', '가능', '가능', '가능'] },
            { name: '본사 5층', type: '프로젝트룸', status: ['가능', '예약됨', '가능', '예약됨'] },
            { name: '본사 6층', type: '화상회의실', status: ['예약됨', '예약됨', '예약됨', '가능'] },
            { name: '본사 7층', type: '크리에이티브룸', status: ['가능', '가능', '예약됨', '가능'] },
        ];

        // 회의실 렌더링 함수
        function renderMeetingRooms() {
            const tbody = document.getElementById('meeting-room-list');
            let html = '';
            
            meetingRooms.forEach(room => {
                let statusHtml = room.status.map(st => {
                    const badgeClass = st === '예약됨' 
                        ? 'bg-red-50 text-red-400 border border-red-100' 
                        : 'bg-green-50 text-green-500 border border-green-100';
                    return `
                        <td class="py-3.5 px-1">
                            <span class="inline-flex items-center justify-center w-full max-w-[70px] py-1.5 rounded-md text-[12px] font-bold ${badgeClass}">
                                ${st}
                            </span>
                        </td>
                    `;
                }).join('');

                html += `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="py-3.5 text-left">
                            <p class="font-bold text-slate-700 truncate max-w-[150px]">${room.name}</p>
                            <p class="text-[11px] text-slate-400 mt-1 truncate">${room.type}</p>
                        </td>
                        ${statusHtml}
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // 게시판 렌더링 및 탭 변경 함수
        function changeTab(tabName) {
            // 탭 스타일 변경
            const tabs = document.querySelectorAll('.board-tab');
            tabs.forEach(tab => {
                if(tab.dataset.tab === tabName) {
                    tab.className = "board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all bg-white shadow-sm text-slate-800 border border-slate-100";
                } else {
                    tab.className = "board-tab flex-1 py-2 text-[12px] lg:text-[13px] font-bold rounded-lg transition-all text-slate-400 hover:text-slate-600";
                }
            });

            // 게시글 목록 변경
            const listEl = document.getElementById('board-list');
            let html = '';
            const data = boardData[tabName] || [];
            
            data.forEach(item => {
                html += `
                    <li class="flex justify-between items-center py-2.5 px-2 hover:bg-slate-50 rounded-lg transition-colors cursor-pointer group">
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <span class="shrink-0 bg-blue-50/50 border border-blue-100 text-blue-500 text-[11px] px-2.5 py-0.5 rounded-full font-semibold min-w-[42px] text-center">
                                ${item.type}
                            </span>
                            <span class="text-[13px] text-slate-700 font-medium group-hover:text-blue-600 transition-colors truncate pr-2">
                                ${item.title}
                            </span>
                        </div>
                        <span class="shrink-0 text-[12px] text-slate-400 font-medium">${item.date}</span>
                    </li>
                `;
            });
            listEl.innerHTML = html;
        }

        // 초기화 실행
        renderMeetingRooms();
        changeTab('공지사항');
    </script>
</body>
</html>
