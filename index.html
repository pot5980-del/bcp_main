<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Design System Workspace</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #1e1e2f;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --hover-color: #32324e;
            --active-color: #4CAF50;
            --memo-bg: #2d2d44;
            --memo-accent: #ffd43b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; font-family: 'Pretendard', sans-serif; overflow: hidden; }

        /* 사이드바: 전체 높이를 고정하고 자식 요소들의 흐름을 제어 */
        .sidebar { 
            width: 320px; 
            background-color: var(--sidebar-bg); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; /* 세로 배치 */
            height: 100vh;
            z-index: 10;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* [수정] 메모 영역: 높이를 고정하여 하단 리스트 위치를 고정함 */
        .memo-area {
            flex-shrink: 0; /* 높이가 줄어들지 않도록 고정 */
            height: 220px;  /* 고정 높이 설정 (가장 적절한 가독성 높이) */
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .memo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--memo-accent);
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* [수정] 메모 컨텐츠: 영역 내에서만 스크롤 발생 */
        .memo-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #e0e0e0;
            word-break: keep-all;
            white-space: pre-wrap;
            overflow-y: auto; /* 텍스트가 많으면 영역 내부에서만 스크롤 */
            flex: 1; /* 남은 메모 영역 공간 차지 */
        }

        /* [수정] 네비게이션 영역: 메모 영역 높이와 상관없이 항상 같은 위치에서 시작 */
        .nav-container {
            flex: 1; /* 남은 사이드바 전체 높이 차지 */
            padding: 25px 15px;
            overflow-y: auto; /* 리스트가 길어지면 여기서 스크롤 */
        }

        .nav-container h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 3px solid var(--active-color); /* 위치 고정 시각화 */
            line-height: 1;
        }

        .nav-list { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            padding: 14px 18px; 
            background: transparent; 
            color: var(--text-main); 
            border: none; 
            text-align: left; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.2s; 
            font-size: 0.95rem;
        }
        .nav-item:hover { background-color: var(--hover-color); }
        .nav-item.active { 
            background-color: var(--active-color); 
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        /* 메인 컨텐츠 */
        .content { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 스크롤바 디자인 (세련된 느낌 추가) */
        .memo-content::-webkit-scrollbar,
        .nav-container::-webkit-scrollbar { width: 4px; }
        .memo-content::-webkit-scrollbar-thumb,
        .nav-container::-webkit-scrollbar-thumb { background: var(--hover-color); border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="memo-area" id="memoArea">
            <div class="memo-header">
                <span>💡</span> 화면 설명
            </div>
            <div id="memoText" class="memo-content">파일을 선택하면 기획 내용이 이곳에 표시됩니다.</div>
        </div>

        <div class="nav-container">
            <h2>Pages List</h2>
            <div class="nav-list" id="navList"></div>
        </div>
    </aside>

    <main class="content">
        <iframe id="viewer" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </main>

    <script>
        const htmlFiles = [
            { id: 1, title: "[A안] 게시판 통합형", path: "A안_경제지표.html", description: "A안은 게시판이 하나의 영역에서 탭으로 구분됩니다. 개인별로 즐겨찾기한 보고서를 메인 페이지에서 바로 연결되도록 버튼을 배치하고, 주간 일정이 없는 사용자를 대비해 경제 지표 컨텐츠를 추가했습니다." },
            { id: 2, title: "[B안] 게시판 분할형", path: "B안_경제지표.html", description: "B안은 게시판별로 영역을 나눴습니다. 그 외의 컨텐츠는 A안과 동일합니다." },
            { id: 3, title: "[A안] 주간일정無", path: "A안_주간일정X.html", description: "이번 주 일정이 없는 경우 화면입니다." },
            { id: 4, title: "[A안] 주간일정有", path: "A안_주간일정O.html", description: "이번 주 일정은 일일업무 혹은 회의실에 주관자/참석자로 등록되어 있는 일정을 보여줍니다." },
            { id: 5, title: "[B안] 주간일정無", path: "B안_주간일정X.html", description: "이번 주 일정이 없는 경우 화면입니다." },
            { id: 6, title: "[B안] 주간일정有", path: "B안_주간일정O.html", description: "이번 주 일정은 일일업무 혹은 회의실에 주관자/참석자로 등록되어 있는 일정을 보여줍니다." },
			{ id: 7, title: "[참고] 초안", path: "old_claude.html", description: "초기 구성한 화면입니다." },
			{ id: 8, title: "[참고] 회의실예약 중심", path: "page0.html", description: "BCP에 접속해서 주로 사용하는 기능을 메인 화면에 배치해 보았습니다." },
        ];

        const navList = document.getElementById('navList');
        const viewer = document.getElementById('viewer');
        const memoText = document.getElementById('memoText');

        function loadContent(file, activeButton) {
            viewer.src = file.path;
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            activeButton.classList.add('active');

            if (file.description) {
                memoText.textContent = file.description;
            } else {
                memoText.textContent = "기획 의도가 등록되지 않은 페이지입니다.";
            }
            
            memoText.style.animation = 'none';
            memoText.offsetHeight; 
            memoText.style.animation = 'fadeIn 0.4s ease-out';
        }

        function initializeApp() {
            if (htmlFiles.length === 0) return;
            htmlFiles.forEach((file, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.textContent = file.title;
                btn.onclick = () => loadContent(file, btn);
                navList.appendChild(btn);
                if (index === 0) loadContent(file, btn);
            });
        }

        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
